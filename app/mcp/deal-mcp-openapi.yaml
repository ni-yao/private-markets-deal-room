# Deal Room MCP — OpenAPI (Swagger 2.0) TEMPLATE for a Copilot Studio custom connector.
# Replace the <PLACEHOLDERS> below with your own deployment values before importing:
#   <MCP_HOST>         the /mcp Container App FQDN (no scheme)
#   <ENTRA_TENANT_ID>  your Entra tenant GUID
#   <MCP_CLIENT_ID>    the app registration (client) ID for the MCP server
swagger: '2.0'
info:
  title: Deal Room MCP
  description: >-
    Streamable MCP server exposing the fund's deals (list_deals, get_deal,
    search_deals) to Copilot Studio, so a partner-MD agent can read live deal
    records — thesis, key figures, diligence workstreams, memo and compliance
    status, and top risks. Backed by Azure Cosmos DB; access is gated by Entra ID.
  version: 1.0.0
host: <MCP_HOST>
basePath: /
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
paths:
  /mcp:
    post:
      summary: Deal Room MCP server
      description: >-
        Streamable HTTP MCP endpoint. Tools: list_deals (all deals as summaries),
        get_deal (one deal as a bounded analyst view), search_deals (keyword
        search across company/sector/thesis).
      x-ms-agentic-protocol: mcp-streamable-1.0
      operationId: InvokeMCP
      responses:
        '200':
          description: Success
securityDefinitions:
  # OAuth 2.0 (Microsoft Entra ID). In Copilot Studio's MCP wizard choose
  # OAuth 2.0 -> Manual and supply the values in mcp/README-copilot-studio.md.
  oauth2_auth:
    type: oauth2
    flow: accessCode
    authorizationUrl: https://login.microsoftonline.com/<ENTRA_TENANT_ID>/oauth2/v2.0/authorize
    tokenUrl: https://login.microsoftonline.com/<ENTRA_TENANT_ID>/oauth2/v2.0/token
    scopes:
      api://<MCP_CLIENT_ID>/deals.read: Read the fund's deals
security:
  - oauth2_auth:
      - api://<MCP_CLIENT_ID>/deals.read
