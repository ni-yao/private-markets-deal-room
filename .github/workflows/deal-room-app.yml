name: deal-room-app

# Builds the Deal Room app image in Azure Container Registry and rolls it out to
# the orchestrator Container App. Infra (deal-room-infra) must have run first so
# the ACR + Container App + Foundry env vars exist. OIDC auth — no secrets.

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - '.github/workflows/deal-room-app.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [ dev, test, prod ]
        default: dev

concurrency:
  group: app-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build-deploy:
    name: Build & deploy app
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}
    env:
      ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve resource names
        id: rid
        run: |
          RG="rg-dealhub-app-${ENVIRONMENT}-swc"
          CA="ca-dealhub-orch-${ENVIRONMENT}-swc"
          ACR=$(az acr list -g "$RG" --query "[0].name" -o tsv)
          LOGIN=$(az acr list -g "$RG" --query "[0].loginServer" -o tsv)
          if [ -z "$ACR" ]; then echo "No ACR found in $RG — run deal-room-infra first." && exit 1; fi
          echo "rg=$RG" >> "$GITHUB_OUTPUT"
          echo "ca=$CA" >> "$GITHUB_OUTPUT"
          echo "acr=$ACR" >> "$GITHUB_OUTPUT"
          echo "image=$LOGIN/deal-room" >> "$GITHUB_OUTPUT"

      - name: Build image in ACR
        run: |
          az acr build \
            -r "${{ steps.rid.outputs.acr }}" \
            -t "deal-room:${{ github.sha }}" \
            -t "deal-room:latest" \
            app

      - name: Roll out to Container App
        run: |
          az containerapp update \
            -n "${{ steps.rid.outputs.ca }}" \
            -g "${{ steps.rid.outputs.rg }}" \
            --image "${{ steps.rid.outputs.image }}:${{ github.sha }}"

      - name: Show app URL
        run: |
          FQDN=$(az containerapp show -n "${{ steps.rid.outputs.ca }}" -g "${{ steps.rid.outputs.rg }}" --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "### Deal Room deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "https://$FQDN" >> "$GITHUB_STEP_SUMMARY"
