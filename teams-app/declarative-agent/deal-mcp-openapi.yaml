# Deal Room MCP — OpenAPI (Swagger 2.0) for the M365 Copilot declarative agent.
#
# CONFIGURE BEFORE USE: the three values below are per-deployment and must point
# at YOUR environment, not any shared/sample env:
#   • host          — your Deal Room backend FQDN (the orchestrator Container App)
#   • authorization/token URLs — your Entra tenant id
#   • the api://.../deals.read scope — your MCP app (client) registration
# The apiPlugin.json reference_id is created in the Teams Developer Portal against
# that same MCP app registration.
swagger: '2.0'
info:
  title: Deal Room MCP
  description: >-
    Streamable MCP server exposing the fund's deals (list_deals, get_deal,
    search_deals) to Copilot, so a partner-MD agent can read live deal records —
    thesis, key figures, diligence workstreams, memo and compliance status, and
    top risks. Backed by Azure Cosmos DB; access is gated by Microsoft Entra ID.
  version: 1.0.0
host: <SHARED_BACKEND_HOST>
basePath: /
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
paths:
  /mcp:
    post:
      summary: Deal Room MCP server
      description: >-
        Streamable HTTP MCP endpoint. Tools: list_deals (all deals as summaries),
        get_deal (one deal as a bounded analyst view), search_deals (keyword
        search across company/sector/thesis).
      x-ms-agentic-protocol: mcp-streamable-1.0
      operationId: InvokeMCP
      responses:
        '200':
          description: Success
securityDefinitions:
  oauth2_auth:
    type: oauth2
    flow: accessCode
    authorizationUrl: https://login.microsoftonline.com/<ENTRA_TENANT_ID>/oauth2/v2.0/authorize
    tokenUrl: https://login.microsoftonline.com/<ENTRA_TENANT_ID>/oauth2/v2.0/token
    scopes:
      api://<MCP_CLIENT_ID>/deals.read: Read the fund's deals
security:
  - oauth2_auth:
      - api://<MCP_CLIENT_ID>/deals.read
